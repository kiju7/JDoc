name: build

# Verifies the project configures, builds and passes tests on Linux, macOS and
# Windows. On the Windows runner there is no system zlib/libjpeg, so this also
# exercises the FetchContent (zlib) + ExternalProject (libjpeg-turbo) fallback
# and compiles the Windows-only I/O code paths under MSVC.
on:
  push:
    branches: [main]        # runs on merges to main, not on WIP develop pushes
  pull_request:
    branches: [main]        # and on pull requests targeting main
  workflow_dispatch:

# A newer push/PR update cancels an in-flight run on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DJDOC_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure
