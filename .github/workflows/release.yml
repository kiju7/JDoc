name: release

# Push a version tag (e.g. `git tag v1.1.0 && git push origin v1.1.0`) to build,
# for Linux/macOS/Windows: the CLI binary, a native SDK (shared library + C
# headers, for the Go/Java bindings and any C/C++ consumer), and Python wheels,
# then attach them to the GitHub Release. workflow_dispatch builds the same
# artifacts without releasing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create the release and upload assets

jobs:
  native:
    name: native-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x64
    steps:
      - uses: actions/checkout@v4

      # NASM assembles libjpeg-turbo's x86 SIMD (WITH_SIMD=ON); arm64 uses NEON.
      - name: Set up NASM
        uses: ilammy/setup-nasm@v1

      # Build the CLI (jdoc) and the shared library with the C API (jdoc_shared).
      # jdoc_shared is what the Go (cgo) and Java (JNA) bindings link against.
      # No compiler cache here: sccache's GitHub Actions cache backend hard-fails
      # the whole build during a cache-service outage, and release builds are
      # infrequent enough that the caching is not worth that fragility.
      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j 4 --target jdoc jdoc_shared

      # CLI archive: jdoc(.exe) + docs.
      - name: Package CLI
        shell: bash
        run: |
          mkdir -p dist
          if [ -f build/Release/jdoc.exe ]; then
            cp build/Release/jdoc.exe jdoc.exe
            7z a "dist/jdoc-${{ matrix.platform }}.zip" jdoc.exe README.md LICENSE
          else
            cp build/jdoc jdoc
            tar czf "dist/jdoc-${{ matrix.platform }}.tar.gz" jdoc README.md LICENSE
          fi

      # Native SDK: shared library + C headers, for the Go/Java bindings and any
      # C/C++ consumer. Windows also ships the import lib (jdoc.lib).
      - name: Package SDK
        shell: bash
        run: |
          mkdir -p dist
          sdk="jdoc-sdk-${{ matrix.platform }}"
          mkdir -p "$sdk/lib" "$sdk/include"
          cp -r include/jdoc "$sdk/include/"
          cp README.md LICENSE "$sdk/"
          if [ -d build/Release ]; then
            # Windows (multi-config): jdoc.dll + import lib jdoc.lib.
            cp build/Release/jdoc.dll "$sdk/lib/"
            cp build/Release/jdoc.lib "$sdk/lib/" 2>/dev/null || true
            7z a "dist/${sdk}.zip" "$sdk"
          else
            # Linux/macOS: copy the versioned shared libs, preserving the
            # unversioned -> versioned symlinks (cp -a; tar keeps symlinks).
            # Version placement differs: libjdoc.so.<ver> (Linux, suffix) vs
            # libjdoc.<ver>.dylib (macOS, infix) — so the globs differ too.
            cp -a build/libjdoc.so* "$sdk/lib/" 2>/dev/null || true
            cp -a build/libjdoc*.dylib "$sdk/lib/" 2>/dev/null || true
            tar czf "dist/${sdk}.tar.gz" "$sdk"
          fi

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  wheels:
    name: wheels-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # NASM for libjpeg-turbo's x86 SIMD in the Windows wheel build (it builds
      # libjpeg-turbo from source; runs on the host, so PATH NASM is visible).
      # Linux wheels use the system libjpeg-turbo and macOS wheels are arm64/NEON,
      # so neither needs it.
      - name: Set up NASM
        uses: ilammy/setup-nasm@v1

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # CPython 3.9–3.12, 64-bit only; skip musl and 32-bit.
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux* *_i686 *-win32"
          CIBW_ARCHS_MACOS: arm64
          # Linux pulls zlib/libjpeg from yum. On macOS the runner ships a
          # pre-installed Homebrew jpeg-turbo built for the runner's own OS;
          # find_package(JPEG) would link it dynamically and delocate then
          # refuses to bundle it (min target 26.0 > the wheel's 11.0), which
          # dropped the macOS wheels. Unlink it so find_package(JPEG) fails
          # and CMake builds libjpeg-turbo statically via its ExternalProject
          # path (as Windows does) — no external dylib for delocate to bundle.
          CIBW_BEFORE_ALL_LINUX: yum install -y zlib-devel libjpeg-turbo-devel
          CIBW_BEFORE_ALL_MACOS: brew unlink jpeg jpeg-turbo 2>/dev/null || true
          # No sccache: its GHA cache backend hard-fails the build during a
          # cache-service outage (see the native job).
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=11.0 CMAKE_ARGS='-DCMAKE_DISABLE_FIND_PACKAGE_JPEG=ON'"

      - name: Upload wheels to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./wheelhouse/*.whl
