name: release

# Push a version tag (e.g. `git tag v1.1.0 && git push origin v1.1.0`) to build
# CLI binaries and Python wheels for Linux/macOS/Windows and attach them to the
# GitHub Release. workflow_dispatch builds the same artifacts without releasing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create the release and upload assets

jobs:
  cli:
    name: cli-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: jdoc-linux-x64
          - os: macos-latest
            asset: jdoc-macos-arm64
          - os: windows-latest
            asset: jdoc-windows-x64
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j 4 --target jdoc

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ -f build/Release/jdoc.exe ]; then
            cp build/Release/jdoc.exe jdoc.exe
            7z a "dist/${{ matrix.asset }}.zip" jdoc.exe README.md LICENSE
          else
            cp build/jdoc jdoc
            tar czf "dist/${{ matrix.asset }}.tar.gz" jdoc README.md LICENSE
          fi

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  wheels:
    name: wheels-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # CPython 3.9–3.12, 64-bit only; skip musl and 32-bit.
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux* *_i686 *-win32"
          CIBW_ARCHS_MACOS: arm64
          # Linux pulls zlib/libjpeg from yum. On macOS the runner ships a
          # pre-installed Homebrew jpeg-turbo built for the runner's own OS;
          # find_package(JPEG) would link it dynamically and delocate then
          # refuses to bundle it (min target 26.0 > the wheel's 11.0), which
          # dropped the macOS wheels. Unlink it so find_package(JPEG) fails
          # and CMake builds libjpeg-turbo statically via its ExternalProject
          # path (as Windows does) — no external dylib for delocate to bundle.
          CIBW_BEFORE_ALL_LINUX: yum install -y zlib-devel libjpeg-turbo-devel
          CIBW_BEFORE_ALL_MACOS: brew unlink jpeg jpeg-turbo 2>/dev/null || true
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=11.0 CMAKE_ARGS=-DCMAKE_DISABLE_FIND_PACKAGE_JPEG=ON"

      - name: Upload wheels to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./wheelhouse/*.whl
