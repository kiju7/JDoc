name: release

# Push a version tag (e.g. `git tag v1.1.0 && git push origin v1.1.0`) to build,
# for Linux/macOS/Windows: the CLI binary and a native SDK (shared library + C
# headers, for the Go/Java bindings and any C/C++ consumer), then attach them to
# the GitHub Release. workflow_dispatch builds the same artifacts without
# releasing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create the release and upload assets

jobs:
  native:
    name: native-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x64
    steps:
      - uses: actions/checkout@v4

      # NASM assembles libjpeg-turbo's x86 SIMD (WITH_SIMD=ON); arm64 uses NEON.
      - name: Set up NASM
        uses: ilammy/setup-nasm@v1

      # Build the CLI (jdoc) and the shared library with the C API (jdoc_shared).
      # jdoc_shared is what the Go (cgo) and Java (JNA) bindings link against.
      # No compiler cache here: sccache's GitHub Actions cache backend hard-fails
      # the whole build during a cache-service outage, and release builds are
      # infrequent enough that the caching is not worth that fragility.
      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j 4 --target jdoc jdoc_shared

      # CLI archive: jdoc(.exe) + docs.
      - name: Package CLI
        shell: bash
        run: |
          mkdir -p dist
          if [ -f build/Release/jdoc.exe ]; then
            cp build/Release/jdoc.exe jdoc.exe
            7z a "dist/jdoc-${{ matrix.platform }}.zip" jdoc.exe README.md LICENSE
          else
            cp build/jdoc jdoc
            tar czf "dist/jdoc-${{ matrix.platform }}.tar.gz" jdoc README.md LICENSE
          fi

      # Native SDK: shared library + C headers, for the Go/Java bindings and any
      # C/C++ consumer. Windows also ships the import lib (jdoc.lib).
      - name: Package SDK
        shell: bash
        run: |
          mkdir -p dist
          sdk="jdoc-sdk-${{ matrix.platform }}"
          mkdir -p "$sdk/lib" "$sdk/include"
          cp -r include/jdoc "$sdk/include/"
          cp README.md LICENSE "$sdk/"
          if [ -d build/Release ]; then
            # Windows (multi-config): jdoc.dll + import lib jdoc.lib.
            cp build/Release/jdoc.dll "$sdk/lib/"
            cp build/Release/jdoc.lib "$sdk/lib/" 2>/dev/null || true
            7z a "dist/${sdk}.zip" "$sdk"
          else
            # Linux/macOS: copy the versioned shared libs, preserving the
            # unversioned -> versioned symlinks (cp -a; tar keeps symlinks).
            # Version placement differs: libjdoc.so.<ver> (Linux, suffix) vs
            # libjdoc.<ver>.dylib (macOS, infix) — so the globs differ too.
            cp -a build/libjdoc.so* "$sdk/lib/" 2>/dev/null || true
            cp -a build/libjdoc*.dylib "$sdk/lib/" 2>/dev/null || true
            tar czf "dist/${sdk}.tar.gz" "$sdk"
          fi

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
